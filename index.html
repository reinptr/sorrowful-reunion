<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorrowful Reunion</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <div class="overlay"></div>

    <section class="content-card">
      <p class="mini-text">A song for the feelings that never truly left.</p>
      <h1>Sorrowful Reunion</h1>
      <p class="subtitle">
        Where memories return quietly, and silence speaks louder than words.
      </p>

      <div class="music-box">
        <button id="playBtn">Play Refrain</button>
        <audio id="song" src="assets/audio/sorrowful-reunion-reff.mp3"></audio>
      </div>

      <div class="quote-box">
        <p id="quoteText">"Some reunions are only meant to happen in memories."</p>
        <button id="nextQuoteBtn">Next Memory</button>
      </div>

      <p class="footer-note">crafted with memory and silence</p>
    </section>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
